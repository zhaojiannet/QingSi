services:
  # 后端服务
  backend:
    build: ./backend
    container_name: qingsi_backend
    volumes:
      - ./backend/app:/app
      - backend-deps:/app/node_modules
      - backend-pnpm-store:/app/.pnpm-store
    ports:
      - "3000:3000"
      # Prisma Studio 端口已移除，避免数据库管理界面暴露
    env_file:
      - ./backend/app/.env
    restart: unless-stopped
    # command: tail -f /dev/null # <-- 换成这个命令，让容器一直挂起
    command: >
      sh -c "
      set -e &&
      echo '=== 安装依赖 ===' &&
      pnpm install &&
      echo '=== 生成 Prisma 客户端 ===' &&
      npx prisma generate &&
      echo '=== 应用数据库迁移 ===' &&
      npx prisma migrate deploy &&
      echo '=== 初始化管理员账户 ===' &&
      node init-admin.js || echo '管理员账户可能已存在' &&
      echo '=== 启动应用 ===' &&
      pnpm dev
      "
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/configs',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - docker-net # <-- 修改于此

  # 前端服务
  frontend:
    build: ./frontend
    container_name: qingsi_frontend
    volumes:
      - ./frontend/app:/app
      - frontend-deps:/app/node_modules
      - frontend-pnpm-store:/app/.pnpm-store
    ports:
      - "5173:5173"
    restart: unless-stopped
    # command: tail -f /dev/null # <-- 换成这个命令，让容器一直挂起
    command: sh -c "pnpm install && pnpm dev"
    networks:
      - docker-net # <-- 修改于此

# 定义要使用的网络
networks:
  docker-net:
    # 关键：将此网络标记为“外部的”
    # 这告诉 Docker Compose 不要尝试创建它，而是直接使用已经存在的同名网络
    external: true

# 定义服务所需的具名卷
volumes:
  backend-deps:
  backend-pnpm-store:
  frontend-deps:
  frontend-pnpm-store: