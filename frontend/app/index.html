<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>青丝 · 美业综合管理系统</title>
    <style>
      /* 初始加载时的 Loading 效果 */
      body.app-loading .loading-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #f0f2f5;
      }
      body.app-loading .loading-dot {
        width: 12px;
        height: 12px;
        margin: 0 6px;
        background-color: #25686c;
        border-radius: 50%;
        display: inline-block;
        animation: loading-bounce 1.4s infinite ease-in-out both;
      }
      body.app-loading .loading-dot:nth-child(1) { animation-delay: -0.32s; }
      body.app-loading .loading-dot:nth-child(2) { animation-delay: -0.16s; }

      @keyframes loading-bounce {
        0%, 80%, 100% { transform: scale(0); }
        40% { transform: scale(1.0); }
      }
      
      /* 关键：在应用加载完成前，隐藏主应用容器 */
      body.app-loading #app {
        display: none;
      }
    </style>
  </head>
  <!-- 默认给 body 添加 app-loading class -->
  <body class="app-loading">
    <div id="app"></div>
    <!-- Loading 动画的 HTML 结构 -->
    <div class="loading-wrapper">
      <div class="loading-dot"></div>
      <div class="loading-dot"></div>
      <div class="loading-dot"></div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
